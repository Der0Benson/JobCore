name: JobCore
version: '${version}'
main: de.derbenson.jobcore.JobCore
api-version: '1.21'
author: derbenson
libraries:
  - com.mysql:mysql-connector-j:8.4.0
commands:
  jobcore:
    description: Hauptbefehl für JobCore.
    usage: /jobcore [config|info|reload]
  level:
    description: Öffnet den Levelpfad.
    usage: /level
permissions:
  customjobs.admin:
    description: Erlaubt administrative JobCore-Befehle.
    default: op
  customjobs.config:
    description: Erlaubt das Umschalten der eigenen BossBar.
    default: true
  customjobs.level:
    description: Erlaubt das Öffnen des Level-Menüs.
    default: true

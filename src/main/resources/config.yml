config-version: 3

storage:
  type: "yaml"
  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "jobcore"
    username: "root"
    password: "passwort"
    table-prefix: "jobcore_"
    use-ssl: false

xp-formula:
  base: 100
  per-level: 50

anti-farm:
  window-seconds: 5
  radius: 8.0
  threshold: 25
  multiplier: 0.5

combo:
  session-seconds: 20
  minimum-logs: 4
  bonus-xp-per-log: 2
  scan-limit: 128
  required-leaves: 6

bossbar:
  inactivity-seconds: 10
  title-template: "<green>%job% <gray>- Lv.<white>%level% <gray>- <white>%xp%/%needed%</white> <gray>(+%xpGained% XP)</gray>"

leaderboards:
  cache-seconds: 30

menu:
  overview-title: "Job-Auswahl"
  path-title: "Levelpfad"
  leaderboard-title: "Bestenlisten"
  close-label: "<red>Schließen"
  back-label: "<yellow>Zur Übersicht"

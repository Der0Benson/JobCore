config-version: 3

npc:
  default-name: "<gold><bold>Questmeister</bold></gold>"
  skin-name: "Amifog"
  menu-title: "Missionstafel"
  header-title: "<gold>Missionstafel</gold>"
  header-lore:
    - "<gray>Es gibt immer genau drei Missionen:"
    - "<aqua>eine Daily<gray>, <gold>eine Weekly<gray> und <light_purple>eine monatliche Mission</light_purple>"
    - "<gray>Die Auswahl rotiert automatisch pro Zyklus."
  ui:
    instruction-title: "<yellow>Steuerung"
    instruction-lore:
      - "<gray>Linksklick auf eine Karte: annehmen oder abgeben"
      - "<gray>Rechtsklick auf eine aktive Karte: abbrechen"
    summary-title: "<gold>Missionstafel</gold>"
    summary-lore:
      - "<gray>Aktiv: <white>%active%</white>"
      - "<gray>Bereit: <white>%claimable%</white>"
      - "<gray>Erledigt: <white>%claimed%/%total%</white>"
    close-label: "<red>Schließen"
    close-lore:
      - "<gray>Schließt dieses Menü.</gray>"
    quest-card-title: "%periodColor%%period% <gray>·</gray> <white>%quest%</white>"
    quest-card-details:
      - "<gray>Typ: <white>%period%</white>"
      - "<gray>Job: <white>%job%</white>"
      - "<gray>Fortschritt: <white>%progress%/%required%</white>"
      - "<gray>Belohnung: <white>+%rewardXp% %job%-XP</white>"
      - "<gray>Reset in <white>%reset%</white>"
    status:
      available: "<aqua>Verfügbar"
      active: "<yellow>Aktiv"
      claimable: "<gold>Abgabebereit"
      claimed: "<green>Bereits erledigt"
    action:
      available: "<gray>Klicke, um diese Mission zu starten.</gray>"
      active: "<gray>Rechtsklick, um sie abzubrechen.</gray>"
      claimable: "<gray>Klicke, um die Belohnung abzuholen.</gray>"
      claimed: "<gray>Warte auf den nächsten Zyklus.</gray>"

